<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <!-- 像素风格花生 - 静态版 -->
  <!-- 上半部分 -->
  <rect x="11" y="3" width="2" height="1" fill="#C49564"/>
  <rect x="9" y="4" width="4" height="1" fill="#C49564"/>
  <rect x="8" y="5" width="6" height="1" fill="#C49564"/>
  <rect x="8" y="6" width="6" height="1" fill="#D4A574"/>
  <rect x="8" y="7" width="6" height="1" fill="#D4A574"/>
  <rect x="9" y="8" width="4" height="1" fill="#C49564"/>
  <!-- 中间收缩部分 -->
  <rect x="10" y="9" width="4" height="1" fill="#C49564"/>
  <rect x="11" y="10" width="2" height="1" fill="#B8860B"/>
  <rect x="10" y="11" width="4" height="1" fill="#C49564"/>
  <!-- 下半部分 -->
  <rect x="8" y="12" width="6" height="1" fill="#C49564"/>
  <rect x="8" y="13" width="6" height="1" fill="#D4A574"/>
  <rect x="8" y="14" width="6" height="1" fill="#D4A574"/>
  <rect x="9" y="15" width="4" height="1" fill="#C49564"/>
  <rect x="11" y="16" width="2" height="1" fill="#C49564"/>
  <!-- 纹理 -->
  <rect x="9" y="6" width="1" height="1" fill="#B8860B"/>
  <rect x="12" y="6" width="1" height="1" fill="#B8860B"/>
  <rect x="9" y="13" width="1" height="1" fill="#B8860B"/>
  <rect x="12" y="13" width="1" height="1" fill="#B8860B"/>
  <!-- 高光 -->
  <rect x="9" y="5" width="1" height="1" fill="#F5DEB3"/>
  <rect x="9" y="12" width="1" height="1" fill="#F5DEB3"/>
  <!-- 叶子 -->
  <rect x="12" y="1" width="2" height="1" fill="#4CAF50"/>
  <rect x="11" y="2" width="1" height="1" fill="#4CAF50"/>
  <rect x="13" y="2" width="1" height="1" fill="#66BB6A"/>
</svg>
